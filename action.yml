name: XML Model Validator
description: Validate XML using xml-model processing instructions with Relax NG and Schematron
author: Andrew Dunning
branding:
  icon: check-circle
  color: blue
inputs:
  files:
    description: Space-separated list of files to validate explicitly
    required: false
  file_list:
    description: Path to a newline-delimited file list
    required: false
  directory:
    description: Directory containing matching files to validate recursively
    required: false
  file_extensions:
    description: Comma- or whitespace-separated file extensions to discover when scanning directories or changed files; a leading period is optional
    required: false
    default: ".xml"
  changed_only:
    description: Validate only changed files with matching extensions from the current push or pull request
    required: false
    default: "false"
  changed_source:
    description: Source for changed_only file discovery (auto, api, git)
    required: false
    default: "auto"
  jobs:
    description: Number of parallel workers to use (0 = auto)
    required: false
    default: "0"
  schema_aliases:
    description: Optional path to a schema alias TSV file
    required: false
  fail_fast:
    description: Stop after the first file that fails validation
    required: false
    default: "false"
runs:
  using: composite
  steps:
    - name: Compute Cache Keys
      id: cache-keys
      shell: bash
      working-directory: ${{ github.action_path }}
      run: |
        set -euo pipefail

        hash_inputs() {
          local path
          local paths=()

          for path in "$@"; do
            if [ -e "$path" ]; then
              paths+=("$path")
            fi
          done

          if [ "${#paths[@]}" -eq 0 ]; then
            printf '%s' "none"
            return
          fi

          find "${paths[@]}" \( -type f -o -type l \) -print0 \
            | sort -z \
            | xargs -0 shasum -a 256 \
            | shasum -a 256 \
            | awk '{print $1}'
        }

        jar_hash="$(hash_inputs pom.xml mvnw .mvn/wrapper src/main)"
        maven_hash="$(hash_inputs pom.xml .mvn/wrapper/maven-wrapper.properties)"

        echo "jar=xml-model-validator-jar-${{ runner.os }}-${jar_hash}" >> "${GITHUB_OUTPUT}"
        echo "maven=xml-model-validator-maven-${{ runner.os }}-${maven_hash}" >> "${GITHUB_OUTPUT}"
    - name: Restore Validator Runtime Cache
      id: restore-runtime-cache
      uses: actions/cache/restore@v5
      with:
        path: |
          ~/.cache/xml-model-validator/schema-downloads
          ~/.cache/xml-model-validator/schematron
        key: xml-model-validator-runtime-${{ runner.os }}-${{ github.run_id }}-${{ github.run_attempt }}
        restore-keys: |
          xml-model-validator-runtime-${{ runner.os }}-
    - name: Restore Validator Jar Cache
      id: restore-jar-cache
      uses: actions/cache/restore@v5
      with:
        path: ~/.cache/xml-model-validator/jar
        key: ${{ steps.cache-keys.outputs.jar }}
    - name: Restore Maven Cache
      id: restore-maven-cache
      uses: actions/cache/restore@v5
      with:
        path: |
          ~/.m2/repository
          ~/.m2/wrapper
        key: ${{ steps.cache-keys.outputs.maven }}
        restore-keys: |
          xml-model-validator-maven-${{ runner.os }}-
    - name: Set Up Java
      uses: actions/setup-java@v5
      with:
        distribution: temurin
        java-version: "25"
    - name: Validate XML
      shell: bash
      working-directory: ${{ github.action_path }}
      env:
        XML_MODEL_VALIDATOR_WORKSPACE: ${{ github.workspace }}
        XML_MODEL_VALIDATOR_INPUT_FILES: ${{ inputs.files }}
        XML_MODEL_VALIDATOR_INPUT_FILE_LIST: ${{ inputs.file_list }}
        XML_MODEL_VALIDATOR_INPUT_DIRECTORY: ${{ inputs.directory }}
        XML_MODEL_VALIDATOR_INPUT_FILE_EXTENSIONS: ${{ inputs.file_extensions }}
        XML_MODEL_VALIDATOR_INPUT_CHANGED_ONLY: ${{ inputs.changed_only }}
        XML_MODEL_VALIDATOR_INPUT_CHANGED_SOURCE: ${{ inputs.changed_source }}
        XML_MODEL_VALIDATOR_INPUT_JOBS: ${{ inputs.jobs }}
        XML_MODEL_VALIDATOR_INPUT_SCHEMA_ALIASES: ${{ inputs.schema_aliases }}
        XML_MODEL_VALIDATOR_INPUT_FAIL_FAST: ${{ inputs.fail_fast }}
        GH_TOKEN: ${{ github.token }}
      run: |
        set -euo pipefail
        bash "${{ github.action_path }}/entrypoint.sh"
    - name: Save Validator Runtime Cache
      if: always()
      uses: actions/cache/save@v5
      with:
        path: |
          ~/.cache/xml-model-validator/schema-downloads
          ~/.cache/xml-model-validator/schematron
        key: xml-model-validator-runtime-${{ runner.os }}-${{ github.run_id }}-${{ github.run_attempt }}
    - name: Save Validator Jar Cache
      if: always() && steps.restore-jar-cache.outputs.cache-hit != 'true'
      uses: actions/cache/save@v5
      with:
        path: ~/.cache/xml-model-validator/jar
        key: ${{ steps.cache-keys.outputs.jar }}
    - name: Save Maven Cache
      if: always() && steps.restore-maven-cache.outputs.cache-hit != 'true'
      uses: actions/cache/save@v5
      with:
        path: |
          ~/.m2/repository
          ~/.m2/wrapper
        key: ${{ steps.cache-keys.outputs.maven }}
