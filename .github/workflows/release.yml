name: Release

on:
  push:
    tags:
      - "v*.*.*"

concurrency:
  group: release-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  publish-jar:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "25"

      - uses: gradle/actions/setup-gradle@v6

      - name: Validate Release Version Metadata
        shell: bash
        run: |
          set -euo pipefail

          tag="${GITHUB_REF_NAME}"

          # Require strict semantic version tags prefixed with v (e.g., v1.2.3).
          if [[ ! "${tag}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Invalid release tag format: ${tag}"
            echo "Expected tag format: vMAJOR.MINOR.PATCH (for example: v1.2.3)"
            exit 1
          fi

          release_version="${tag#v}"

          project_version="$(gradle -q printVersion)"
          cff_version="$(sed -n 's|^[[:space:]]*version:[[:space:]]*"\([^"]*\)"[[:space:]]*$|\1|p' CITATION.cff | head -n1)"

          if [[ -z "${project_version}" || -z "${cff_version}" ]]; then
            echo "Unable to read version from Gradle metadata or CITATION.cff"
            exit 1
          fi

          if [[ "${release_version}" != "${project_version}" || "${release_version}" != "${cff_version}" ]]; then
            echo "Release metadata mismatch detected"
            echo "tag=${tag}"
            echo "normalized_tag=${release_version}"
            echo "project version=${project_version}"
            echo "CITATION.cff version=${cff_version}"
            exit 1
          fi

          echo "Release tag, Gradle metadata, and CITATION.cff versions are synchronized: ${release_version}"

      - name: Build and Verify
        run: gradle check jar

      - name: Validate Jar Version Output
        shell: bash
        run: |
          set -euo pipefail

          expected_version="${GITHUB_REF_NAME}"
          expected_version="${expected_version#v}"

          actual_output="$(java -jar build/libs/xml-model-validator.jar --version)"
          actual_version="${actual_output#xml-model-validator }"

          if [[ "${actual_version}" != "${expected_version}" ]]; then
            echo "Jar version output mismatch detected"
            echo "expected=${expected_version}"
            echo "actual_output=${actual_output}"
            exit 1
          fi

          echo "Jar version output is synchronized: ${actual_output}"

      - name: Prepare Release Assets
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p dist
          cp build/libs/xml-model-validator.jar dist/xml-model-validator.jar
          shasum -a 256 dist/xml-model-validator.jar > dist/xml-model-validator.jar.sha256

      - name: Upload Release Assets
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          tag="${GITHUB_REF_NAME}"

          gh release create "${tag}" \
            dist/xml-model-validator.jar \
            dist/xml-model-validator.jar.sha256 \
            --title "${tag}" \
            --generate-notes \
            --verify-tag

      - name: Update Major Version Tag
        shell: bash
        run: |
          set -euo pipefail

          tag="${GITHUB_REF_NAME}"
          major_tag="v${tag#v}"
          major_tag="${major_tag%%.*}"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git tag -f "${major_tag}" "${tag}"
          git push origin "refs/tags/${major_tag}" --force

          echo "Updated ${major_tag} to point at ${tag}"
