name: Bug Report
description: Report a problem with the validator.
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Before reporting, please check that your issue is not already listed under [open issues](https://github.com/adunning/xml-model-validator/issues).
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What went wrong?
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: |
        Provide a minimal example: the `xml-model` processing instruction, schema snippet, and/or Action workflow configuration that triggers the problem.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
      description: What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behaviour
      description: What actually happened? Include any error messages or logs.
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version
      description: Which version of the validator are you using?
      placeholder: e.g. 2.1.1
    validations:
      required: true
  - type: dropdown
    id: interface
    attributes:
      label: Interface
      options:
        - GitHub Action
        - CLI
        - Both
    validations:
      required: true
